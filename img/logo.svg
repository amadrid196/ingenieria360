<svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Estilo de fuente simple para representar el logo -->
  <style>
    .text-white { fill: #ffffff; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 32px; letter-spacing: -1px; }
    .text-yellow { fill: #f5b922; font-family: 'Inter', sans-serif; font-weight: 800; font-size: 42px; }
    .tower { stroke: #ffffff; stroke-width: 2; fill: none; }
  </style>
  
  <!-- "ingenieria" -->
  <text x="10" y="50" class="text-white">ingenieria</text>
  
  <!-- Torre de transmisión simplificada -->
  <g transform="translate(185, 15) scale(0.6)">
    <path d="M20 80 L50 10 L80 80" class="tower" />
    <path d="M30 60 L70 60" class="tower" />
    <path d="M40 35 L60 35" class="tower" />
    <circle cx="50" cy="5" r="4" fill="white" />
  </g>
  
  <!-- "360" en un bloque destacado -->
  <rect x="235" y="15" width="60" height="50" rx="4" fill="#0b223d" />
  <text x="238" y="56" class="text-yellow">360</text>
</svg>
